name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'db/**'
              - 'alembic.ini'
              - 'scripts/seed_db.py'
            sandbox:
              - 'docker/cpp/**'
              - 'docker/java/**'
              - 'docker/python/**'
              - 'docker/nodejs/**'
              - 'scripts/build_images.sh'

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          password: ${{ secrets.DROPLET_PASSWORD }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          envs: DB_CHANGED,SANDBOX_CHANGED
          script_stop: true
          script: |
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin main
            
            # 1. Handle Database & Migration Changes
            if [ "${{ steps.filter.outputs.db }}" == "true" ]; then
              echo "DB/Schema changes detected."
              docker compose down -v
              docker compose up --build -d db
              
              # Better than sleep: wait for Postgres specifically
              until docker compose exec db pg_isready -U postgres; do
                echo "Waiting for Postgres..."
                sleep 2
              done
              
              # Run migrations then seed
              docker compose run --rm api alembic upgrade head
              docker compose run --rm api python scripts/seed_db.py
            fi

            # 2. Standard Update (API/App logic)
            docker compose up --build -d
            
            # 3. Handle Sandbox Image Rebuilds
            if [ "${{ steps.filter.outputs.sandbox }}" == "true" ]; then
              echo "Rebuilding sandbox images..."
              bash scripts/build_images.sh
            fi
            
            # 4. Cleanup
            docker image prune -f
            docker ps