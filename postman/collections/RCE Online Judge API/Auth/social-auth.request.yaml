$kind: http-request
name: Social Auth
method: POST
url: '{{baseUrl}}/api/auth/social'
order: 4000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{s2s_token}}'
    description: S2S token for social auth validation
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "name": "John Doe",
      "provider": "google",
      "provider_account_id": "123456789"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      if (pm.response.code === 200) {
          const jsonData = pm.response.json();
          pm.collectionVariables.set("token", jsonData.access_token);
      }
